name: Build Gemini Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Create .env File
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    - name: Setup Gradle Wrapper inside Subfolder
      run: |
        cd gemini-start
        if [ ! -f ./gradlew ]; then
          gradle wrapper
        fi
        chmod +x ./gradlew

    - name: Build Debug APK with Gradle
      run: |
        cd gemini-start
        ./gradlew assembleDebug --no-daemon -x test || ./gradlew assemble --no-daemon -x test || true

    - name: Find and Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: gemini-app-apk
        path: |
          **/*.apk
