name: Build Gemini Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # ଏହି ଷ୍ଟେପ୍‌ଟି ସିଷ୍ଟମ୍‌ରେ Gradle ଇନଷ୍ଟଲ୍ କରିବ, ଯାହାଦ୍ୱାରା ୧୪ ସେକେଣ୍ଡର ଏରର୍ ଆଉ ଆସିବନି
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create .env File
      run: |
        cd gemini-start
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    - name: Generate Gradle Wrapper if Missing
      run: |
        cd gemini-start
        gradle wrapper --gradle-version 8.4
        chmod +x ./gradlew

    - name: Build Android App
      run: |
        cd gemini-start
        ./gradlew assembleDebug --no-daemon -x test || ./gradlew assembleDebug --no-daemon --stacktrace || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gemini-app-apk
        path: |
          **/*.apk
          gemini-start/**/*.apk
